<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Pets</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-light">
  <div class="container py-4">

    <h1 class="text-center mb-4">Cadastro de Pets</h1>

    <!-- FORM -->
    <form id="animal-form" class="card p-3 mb-4">
      <input type="hidden" id="animal-id" />

      <input class="form-control mb-2" id="nome" placeholder="Nome" required />
      <input class="form-control mb-2" id="raca" placeholder="Raça" required />

      <button class="btn btn-primary">Salvar</button>
    </form>

    <!-- LISTA -->
    <div id="lista-animais"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
